# Default values for nut-upsd.
env:
  serial: mustbeset
strategy:
  type: Recreate
volumeMounts:
# TODO make this work with pod security policies instead of securityContext
# - name: usb
#   mountpath: /dev/ttyUSB0
- name: secret
  mountPath: /run/secrets/nut-upsd-password
  readOnly: true
  subPath: nut-upsd-password
volumes:
# - name: usb
#   hostPath: { path: /dev/ttyUSB0 }
- name: secret
  secret:
    secretName: nut-upsd-password

image:
  repository: instantlinux/nut-upsd
  pullPolicy: IfNotPresent
  tag: "2.7.4-r8"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

deployment: {}
serviceAccount:
  enabled: true
  name: example-privileged
podAnnotations: {}
podSecurityContext: {}
securityContext:
  privileged: true

service:
  enabled: false
  ports:
  - port: 3493
    nodePort: 30493
    targetPort: 3493

ingress:
  enabled: false

resources: {}

autoscaling:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
